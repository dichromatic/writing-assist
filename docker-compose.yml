version: '3.7'

services:
  workspace:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    command: sleep infinity
    volumes:
      - ./:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - node-modules:/workspace/node_modules
    ports:
      - '${VITE_PORT:-5180}:${VITE_PORT:-5180}'
      - '${VITE_PREVIEW_PORT:-4180}:${VITE_PREVIEW_PORT:-4180}'
    environment:
      HOST: 0.0.0.0
      PORT: ${VITE_PORT:-5180}
      PREVIEW_PORT: ${VITE_PREVIEW_PORT:-4180}
      RUST_LOG: info

volumes:
  cargo-registry:
  cargo-git:
  node-modules:
