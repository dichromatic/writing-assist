version: '3.7'

services:
  workspace:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    command: sleep infinity
    volumes:
      - ./:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - node-modules:/workspace/node_modules
    ports:
      - '5173:5173'
      - '4173:4173'
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      RUST_LOG: info

volumes:
  cargo-registry:
  cargo-git:
  node-modules:
